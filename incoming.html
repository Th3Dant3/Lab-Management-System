<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming Jobs Dashboard</title>
<link rel="stylesheet" href="incoming.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="scan-lines"></div>

  <nav class="topbar">
    <button class="back-btn" onclick="goBack()">← Main Page</button>
    <div class="topbar-brand"><span class="brand-pulse"></span>JOBS MONITOR</div>
    <div class="topbar-meta">
      <div class="meta-block"><span class="meta-lbl">Total</span><span class="meta-val" id="totalJobs">--</span></div>
      <div class="meta-sep"></div>
      <div class="meta-block"><span class="meta-lbl">Updated</span><span class="meta-val" id="lastUpdated">--</span></div>
      <div class="meta-sep"></div>
      <span id="refreshStatus" class="status-pill live">Live</span>
    </div>
  </nav>

  <div id="app">

    <div class="controls-row">
      <div class="filter-wrap">
        <label class="filter-lbl" for="dateFilter">Date</label>
        <input type="date" id="dateFilter" class="date-input">
        <button class="btn-apply" onclick="applyDateFilter()">Apply</button>
        <button class="btn-today" onclick="resetDateFilter()">Today</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tabIncomingBtn" onclick="switchTab('incoming')">Incoming</button>
        <button class="tab-btn" id="tabTrendBtn" onclick="switchTab('trend')">Trend</button>
        <button class="tab-btn" id="tabCompareBtn" onclick="switchTab('compare')">Compare</button>
      </div>
    </div>

    <div id="incomingTab" class="tab-content">
      <div class="kpi-strip" id="kpiGrid"></div>
      <div class="split-body">
        <div class="split-left">
          <div class="panel-head">
            <span class="panel-title">Queue Breakdown</span>
            <span id="queueHourLabel" class="panel-sub"></span>
          </div>
          <div id="container" class="queue-list"></div>
        </div>
        <div class="split-right">
          <div class="compare-card">
            <div class="panel-head">
              <span class="panel-title" id="compareTitle">Today vs Yesterday</span>
              <div class="compare-legend">
                <span class="leg-item"><span class="leg-dot today-dot"></span><span id="legToday">Today</span></span>
                <span class="leg-item"><span class="leg-dot yest-dot"></span><span id="legYest">Yesterday</span></span>
              </div>
            </div>
            <div class="compare-chart-wrap"><canvas id="comparisonChart"></canvas></div>
          </div>
          <div class="hourly-card">
            <div class="panel-head">
              <span class="panel-title">Hourly Flow</span>
              <span id="chartInsight" class="insight-pill"></span>
            </div>
            <div class="hourly-chart-wrap"><canvas id="hourlyChart"></canvas></div>
          </div>
        </div>
      </div>
    </div>

    <!-- COMPARE TAB -->
    <div id="compareTab" class="tab-content" style="display:none;">
      <div class="compare-tab-wrap">

        <!-- Date Picker Row -->
        <div class="comp-picker-row">
          <div class="comp-picker-label">Select up to 5 dates to compare</div>
          <div class="comp-picker-inputs" id="compDateInputs">
            <div class="comp-date-slot">
              <input type="date" class="comp-date-input" id="compDate0">
              <div class="comp-dot" style="background:#38bdf8"></div>
            </div>
            <div class="comp-date-slot">
              <input type="date" class="comp-date-input" id="compDate1">
              <div class="comp-dot" style="background:#a78bfa"></div>
            </div>
            <div class="comp-date-slot">
              <input type="date" class="comp-date-input" id="compDate2">
              <div class="comp-dot" style="background:#22d3ee"></div>
            </div>
            <div class="comp-date-slot">
              <input type="date" class="comp-date-input" id="compDate3">
              <div class="comp-dot" style="background:#fb923c"></div>
            </div>
            <div class="comp-date-slot">
              <input type="date" class="comp-date-input" id="compDate4">
              <div class="comp-dot" style="background:#4ade80"></div>
            </div>
          </div>
          <button class="btn-apply" onclick="runComparison()">Compare</button>
          <button class="btn-today" onclick="resetComparison()">Reset</button>
        </div>

        <!-- KPI Comparison Grid -->
        <div id="compKpiGrid" class="comp-kpi-grid"></div>

        <!-- Dept Bar Chart -->
        <div class="comp-chart-card" id="compChartCard" style="display:none">
          <div class="panel-head">
            <span class="panel-title">Department Totals</span>
            <span id="compInsight" class="insight-pill"></span>
          </div>
          <div class="comp-multi-chart-wrap">
            <canvas id="compMultiChart"></canvas>
          </div>
        </div>

        <!-- Per-dept breakdown -->
        <div id="compDeptGrid" class="comp-dept-grid"></div>

      </div>
    </div>

    <div id="trendTab" class="tab-content" style="display:none;">
      <div class="trend-card">
        <div class="panel-head">
          <span class="panel-title">Daily Incoming Trend</span>
          <span id="trendInsight" class="insight-pill"></span>
        </div>
        <div class="trend-controls">
          <button onclick="loadTrend(7)"  class="trend-btn">7D</button>
          <button onclick="loadTrend(14)" class="trend-btn active">14D</button>
          <button onclick="loadTrend(30)" class="trend-btn">30D</button>
        </div>
        <div class="trend-chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
    </div>

  </div>
<script src="incoming.js"></script>
</body>
</html>
