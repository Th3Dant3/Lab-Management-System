<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Incoming Jobs Dashboard</title>

<link rel="stylesheet" href="incoming.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

  <!-- TOP NAV -->
  <div class="top-nav">
    <button class="back-btn" onclick="goBack()">← Back to Main Page</button>
  </div>

<div id="app">

  <!-- HEADER -->
  <div class="header-bar">
    <div>
      <h1>Incoming Jobs Dashboard</h1>
      <div class="subtitle">Real-time queue distribution by department</div>
    </div>

    <div class="meta">
      <span id="totalJobs">Total: --</span>
      <span id="lastUpdated">Updated: --</span>
      <span id="refreshStatus">Live</span>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">

    <div class="filter-group">
      <label for="dateFilter">Date</label>
      <input type="date" id="dateFilter">
    </div>

    <div class="filter-actions">
      <button class="filter-btn" onclick="applyDateFilter()">Apply</button>
      <button class="filter-btn secondary" onclick="resetDateFilter()">Today</button>
    </div>

  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabIncomingBtn" onclick="switchTab('incoming')">
      Incoming
    </button>
    <button class="tab-btn" id="tabTrendBtn" onclick="switchTab('trend')">
      Trend
    </button>
  </div>

  <!-- INCOMING TAB -->
  <div id="incomingTab" class="tab-content active">

    <!-- KPI -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- LEFT PANEL -->
      <section class="panel">
        <h3>Queue Breakdown</h3>
        <div id="container"></div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="panel">
        <div class="panel-header">
          <h3>Hourly Flow</h3>
          <span id="chartInsight" class="chart-insight"></span>
        </div>

        <div class="chart-wrap">
          <canvas id="hourlyChart"></canvas>
        </div>
      </section>

    </div>

  </div>

  <!-- TREND TAB -->
  <div id="trendTab" class="tab-content" style="display:none;">

    <section class="panel trend-panel">

      <div class="panel-header">
        <h3>Trend (Daily Incoming)</h3>
        <span id="trendInsight" class="chart-insight"></span>
      </div>

      <div class="trend-controls">
        <button onclick="loadTrend(7)">7D</button>
        <button onclick="loadTrend(14)">14D</button>
        <button onclick="loadTrend(30)">30D</button>
      </div>

      <div class="trend-chart-wrap">
        <canvas id="trendChart"></canvas>
      </div>

    </section>

  </div>

</div>

<script src="incoming.js"></script>

</body>
</html>
