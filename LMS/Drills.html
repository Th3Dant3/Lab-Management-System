<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drill Frames — Shape Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0c10; --surface:#13141a; --surface2:#1a1c24; --border:#252830;
  --text:#dde1ed; --muted:#585d70; --accent:#7c6aff;
  --pend-bg:#2a2100; --pend-border:#c89200aa; --pend-text:#f5c518;
  --conf-bg:#002419; --conf-border:#00c870aa; --conf-text:#00e89c;
  --def-bg:#1c1e27;  --def-border:#2e3040;    --def-text:#8890a8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:grid;place-items:center;flex-shrink:0}
header h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
header h1 em{color:var(--accent);font-style:normal}
.sync{margin-left:auto;display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 13px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sync.ok   .sync-dot{background:var(--conf-text)}
.sync.busy .sync-dot{background:var(--pend-text);animation:pulse 1s infinite}
.sync.err  .sync-dot{background:#ff5555}
.sync.ok  {border-color:#00e89c40;color:var(--conf-text)}
.sync.busy{border-color:#f5c51840;color:var(--pend-text)}
.sync.err {border-color:#ff555540;color:#ff5555}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 67px)}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:22px 18px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
.lbl{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.tabs{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;display:flex;gap:3px}
.tabs button{flex:1;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;padding:7px 4px;border-radius:5px;cursor:pointer;transition:all .15s}
.tabs button.on{background:var(--accent);color:#fff}
select,input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:9px 11px;border-radius:8px;outline:none;appearance:none;transition:border-color .2s}
select:focus,input:focus{border-color:var(--accent)}
select option{background:#13141a}
.clear{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:8px;border-radius:8px;cursor:pointer;transition:all .2s}
.clear:hover{border-color:#ff5555;color:#ff5555}

/* LEGEND */
.legend{display:flex;flex-direction:column;gap:7px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted)}
.leg-chip{width:34px;height:22px;border-radius:4px;display:grid;place-items:center;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;flex-shrink:0}
.leg-chip.def {background:var(--def-bg);border:1px solid var(--def-border);color:var(--def-text)}
.leg-chip.pend{background:var(--pend-bg);border:1px solid var(--pend-border);color:var(--pend-text)}
.leg-chip.conf{background:var(--conf-bg);border:1px solid var(--conf-border);color:var(--conf-text)}

/* STATS */
.stats{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-top:auto;display:flex;flex-direction:column;gap:8px}
.stat{display:flex;justify-content:space-between;align-items:center}
.stat+.stat{padding-top:8px;border-top:1px solid var(--border)}
.stat-lbl{font-size:.75rem;color:var(--muted)}
.stat-val{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;color:var(--accent)}
.stat-val.y{color:var(--pend-text)}
.stat-val.g{color:var(--conf-text)}

/* MAIN */
main{flex:1;overflow:auto;padding:22px 26px}
.tbl-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2);position:sticky;top:0;z-index:2}
th{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:11px 13px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:9px 13px;font-size:.84rem;vertical-align:top}
.mono{font-family:'DM Mono',monospace;font-size:.8rem}
.badge{display:inline-block;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.badge.bushing{background:#7c6aff18;color:#a99aff;border:1px solid #7c6aff30}
.badge.bolt   {background:#ff8c4218;color:#ffb07a;border:1px solid #ff8c4230}

/* SHAPE TAGS */
.shapes{display:flex;flex-wrap:wrap;gap:5px;max-width:520px}
.stag{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:4px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;cursor:pointer;user-select:none;transition:transform .1s,box-shadow .2s,background .15s;border:1px solid var(--def-border);background:var(--def-bg);color:var(--def-text);position:relative}
.stag:hover{transform:scale(1.1);border-color:#444}
.stag:active{transform:scale(.95)}
.stag.pending  {background:var(--pend-bg);border-color:var(--pend-border);color:var(--pend-text);animation:glow-y 2s ease-in-out infinite}
.stag.confirmed{background:var(--conf-bg);border-color:var(--conf-border);color:var(--conf-text);box-shadow:0 0 8px #00e89c20}
.stag.saving::after{content:'';position:absolute;inset:0;border-radius:4px;background:#0b0c10bb}
.stag.saving::before{content:'';position:absolute;width:9px;height:9px;border:2px solid transparent;border-top-color:var(--pend-text);border-radius:50%;animation:spin .6s linear infinite;z-index:1}
@keyframes glow-y{0%,100%{box-shadow:0 0 6px #f5c51820}50%{box-shadow:0 0 14px #f5c51840}}
@keyframes spin{to{transform:rotate(360deg)}}
.no-shapes{font-size:.77rem;color:var(--muted);font-style:italic}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.75rem;padding:10px 16px;border-radius:9px;box-shadow:0 8px 24px #00000060;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.22,1,.36,1);z-index:999;max-width:300px}
#toast.show   {transform:translateY(0);opacity:1}
#toast.ok     {border-color:#00e89c55;color:var(--conf-text)}
#toast.warn   {border-color:#f5c51855;color:var(--pend-text)}
#toast.err    {border-color:#ff555555;color:#ff5555}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:700px){.app{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>

<header>

    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">

    <div class="stats">

    </div>
  </aside>

  <main>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy('style')">Style <span id="ss">↕</span></th>
          <th onclick="sortBy('color')">Color <span id="sc">↕</span></th>
          <th>SKU</th><th>Type</th>
          <th>Shapes — tap to set status</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" style="display:none;padding:50px;text-align:center;color:var(--muted)">No frames match filters.</div>
    </div>
  </main>
</div>

<div id="toast"></div>

const ALL = [
  ...BUSHING.map(r=>({style:r[0],color:r[1],sku:r[2],shapes:r[3],type:'bushing'})),
  ...BOLT.map(r=>({style:r[0],color:r[1],sku:r[2],shapes:r[3],type:'bolt'}))
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let tagStates = {};
let tab='all', sortCol='style', sortDir=1, filtered=[...ALL];

// ═══════════════════════════════════════════
// SYNC UI
// ═══════════════════════════════════════════
function setSyncUI(state, msg) {
  const el = document.getElementById('sync');
  const tx = document.getElementById('syncTxt');
  el.className = 'sync ' + state;
  tx.textContent = msg;
}

// ═══════════════════════════════════════════
// JSONP HELPER — all Apps Script calls go through here
// ═══════════════════════════════════════════
function jsonp(url, callback) {
  const id  = '__cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const old = document.getElementById('_jsonp');
  if (old) old.remove();
  if (window[id]) delete window[id];

  const timer = setTimeout(() => {
    const s = document.getElementById('_jsonp');
    if (s) s.remove();
    delete window[id];
    callback(null, 'timeout');
  }, 12000);

  window[id] = (data) => {
    clearTimeout(timer);
    const s = document.getElementById('_jsonp');
    if (s) s.remove();
    delete window[id];
    callback(data, null);
  };

  const sc = document.createElement('script');
  sc.id  = '_jsonp';
  sc.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + id;
  sc.onerror = () => {
    clearTimeout(timer);
    delete window[id];
    callback(null, 'script error');
  };
  document.head.appendChild(sc);
}

// ═══════════════════════════════════════════
// LOAD from Sheets on page open
// ═══════════════════════════════════════════
function loadFromSheets() {
  setSyncUI('busy', 'Loading…');
  jsonp(SCRIPT_URL + '?action=load', (data, err) => {
    if (err || !data || !data.success) {
      setSyncUI('err', 'Load failed');
      toast('Could not load from Sheets', 'err');
      return;
    }
    tagStates = data.statuses || {};
    const n = Object.keys(tagStates).length;
    setSyncUI('ok', n > 0 ? 'Loaded ' + n + ' status' + (n>1?'es':'') : 'Connected');
    render();
    if (n > 0) toast('↓ Restored ' + n + ' shape status' + (n>1?'es':''), 'ok');
  });
}

// ═══════════════════════════════════════════
// SAVE on tap
// ═══════════════════════════════════════════
const CYCLE = {default:'pending', pending:'confirmed', confirmed:'default'};

function tapShape(el, sku, shape, sheetTab) {
  const key  = sku + '|' + shape;
  const next = CYCLE[tagStates[key] || 'default'];

  // Update UI immediately
  tagStates[key] = next;
  el.className   = 'stag' + (next === 'default' ? '' : ' ' + next);
  updateStats();

  // Save to Sheets
  el.classList.add('saving');
  setSyncUI('busy', 'Saving…');

  const params = '?action=save&sku=' + encodeURIComponent(sku) +
                 '&shape=' + encodeURIComponent(shape) +
                 '&status=' + encodeURIComponent(next) +
                 '&sheetTab=' + encodeURIComponent(sheetTab);

  jsonp(SCRIPT_URL + params, (data, err) => {
    el.classList.remove('saving');
    if (err || !data || !data.success) {
      setSyncUI('err', 'Save failed');
      toast('✗ Save failed — ' + (err || 'unknown'), 'err');
    } else {
      setSyncUI('ok', 'Saved ✓');
      toast('✓ ' + sku + ' · ' + shape + ' → ' + next, 'ok');
    }
    setTimeout(() => setSyncUI('ok', 'Connected'), 2500);
  });
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const shapeFilter = parseInt(document.getElementById('fShape').value, 10);
  tbody.innerHTML = '';
  if (!filtered.length) { empty.style.display='block'; updateStats(); return; }
  empty.style.display = 'none';

  filtered.forEach(row => {
    const tr = document.createElement('tr');
    ['style','color','sku'].forEach(f => {
      const td = document.createElement('td');
      td.className = 'mono'; td.textContent = row[f]; tr.appendChild(td);
    });
    const tdT = document.createElement('td');
    const b = document.createElement('span');
    b.className = 'badge ' + row.type;
    b.textContent = row.type === 'bushing' ? 'Bushing' : 'Bolt/Slot';
    tdT.appendChild(b); tr.appendChild(tdT);

    const tdS = document.createElement('td');
    if (!row.shapes.length) {
      tdS.innerHTML = '<span class="no-shapes">—</span>';
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'shapes';
      const sheetTab = row.type === 'bushing' ? 'Bushing' : 'BoltSlot';
      row.shapes.forEach(shape => {
        if (!isNaN(shapeFilter) && shape !== shapeFilter) return;
        const tag = document.createElement('span');
        const st  = tagStates[row.sku + '|' + shape] || 'default';
        tag.className   = 'stag' + (st === 'default' ? '' : ' ' + st);
        tag.textContent = shape;
        tag.title       = row.sku + ' · ' + shape;
        tag.onclick     = () => tapShape(tag, row.sku, shape, sheetTab);
        wrap.appendChild(tag);
      });
      if (!wrap.children.length) { tdS.innerHTML = '<span class="no-shapes">—</span>'; }
      else tdS.appendChild(wrap);
    }
    tr.appendChild(tdS);
    tbody.appendChild(tr);
  });
  updateStats();
}

function updateStats() {
  document.getElementById('sRows').textContent = filtered.length;
  const v = Object.values(tagStates);
  document.getElementById('sPend').textContent = v.filter(x=>x==='pending').length;
  document.getElementById('sConf').textContent = v.filter(x=>x==='confirmed').length;
}

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
function applyFilters() {
  const sv = document.getElementById('fStyle').value;
  const cv = document.getElementById('fColor').value;
  const kv = document.getElementById('fSKU').value.trim().toLowerCase();
  const shv= document.getElementById('fShape').value.trim();
  filtered = ALL.filter(r => {
    if (tab==='bushing' && r.type!=='bushing') return false;
    if (tab==='bolt'    && r.type!=='bolt')    return false;
    if (sv && r.style!==sv) return false;
    if (cv && r.color!==cv) return false;
    if (kv && !r.sku.toLowerCase().includes(kv)) return false;
    if (shv && !isNaN(+shv) && !r.shapes.includes(+shv)) return false;
    return true;
  });
  filtered.sort((a,b)=>((+a[sortCol])-(+b[sortCol]))*sortDir);
  render();
}
function clearFilters(){
  ['fStyle','fColor'].forEach(id=>document.getElementById(id).value='');
  ['fSKU','fShape'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
}
function setTab(btn){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); tab=btn.dataset.tab; applyFilters();
}
function sortBy(col){
  sortDir = sortCol===col ? sortDir*-1 : 1; sortCol=col;
  document.getElementById('ss').textContent = sortCol==='style'?(sortDir>0?'↑':'↓'):'↕';
  document.getElementById('sc').textContent = sortCol==='color'?(sortDir>0?'↑':'↓'):'↕';
  applyFilters();
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg, type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.className=''},3000);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(function init(){
  const styles=[...new Set(ALL.map(r=>r.style))].sort((a,b)=>+a-+b);
  const colors=[...new Set(ALL.map(r=>r.color))].sort((a,b)=>+a-+b);
  const se=document.getElementById('fStyle');
  styles.forEach(s=>se.add(new Option(s,s)));
  const ce=document.getElementById('fColor');
  colors.forEach(c=>ce.add(new Option(c,c)));
  applyFilters();
  loadFromSheets();
})();
