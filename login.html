<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zenni LMS Control Center</title>

<link rel="stylesheet" href="login.css">

<script>
console.time("LOGIN_PAGE_LOAD");
window.addEventListener("load", () => {
  console.timeEnd("LOGIN_PAGE_LOAD");
});
</script>

</head>

<body>

<div class="login-wrapper">

  <div class="login-container">

    <!-- 🔹 SYSTEM IDENTITY -->
    <div class="login-header">
      <h1>Zenni LMS</h1>
      <p>Manufacturing Control Center</p>
    </div>

    <!-- 🔹 FORM -->
    <div class="form-group">
      <input id="username" placeholder="Username" autocomplete="username">
    </div>

    <div class="form-group password-group">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <span id="togglePassword">👁</span>
    </div>

    <!-- 🔹 ACTION -->
    <button id="loginBtn" onclick="login()">Sign In</button>

    <!-- 🔹 STATUS -->
    <p id="message" class="login-message"></p>

  </div>

</div>

<script src="login.js"></script>

<!-- 🔥 UX Enhancements -->
<script>

  // ENTER KEY LOGIN
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      document.getElementById("loginBtn").click();
    }
  });

  // SHOW / HIDE PASSWORD
  document.getElementById("togglePassword").addEventListener("click", () => {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
  });

</script>

</body>
</html>
