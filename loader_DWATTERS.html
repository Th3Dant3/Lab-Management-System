<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#020509;overflow:hidden;height:100vh;width:100vw;}

/* ── Coastal sunset — deep teal/ocean/dusk ── */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 100% 45% at 50% 0%,   rgba(20,80,120,.28)  0%,transparent 60%),
    radial-gradient(ellipse 80%  50% at 50% 40%,  rgba(0,60,100,.18)   0%,transparent 65%),
    radial-gradient(ellipse 60%  35% at 20% 70%,  rgba(0,40,80,.12)    0%,transparent 55%),
    radial-gradient(ellipse 60%  35% at 80% 70%,  rgba(0,40,80,.12)    0%,transparent 55%),
    radial-gradient(ellipse 100% 30% at 50% 100%, rgba(180,100,0,.1)   0%,transparent 55%),
    linear-gradient(180deg,#020509 0%,#030710 45%,#040608 100%);
  animation:bgp 6s ease-in-out infinite;
}
@keyframes bgp{0%,100%{opacity:.9}50%{opacity:1}}

/* ── Ocean horizon glow ── */
.ocean-horizon{
  position:fixed;bottom:0;left:0;right:0;height:280px;
  background:linear-gradient(180deg,
    transparent,
    rgba(0,80,140,.06) 40%,
    rgba(0,100,160,.12) 70%,
    rgba(180,100,0,.08) 100%);
  pointer-events:none;z-index:1;
}
/* Horizon line — where ocean meets sky */
.horizon-line{
  position:fixed;left:0;right:0;
  height:1.5px;bottom:110px;
  background:linear-gradient(90deg,transparent,rgba(0,160,220,.3),rgba(255,180,60,.2),rgba(0,160,220,.3),transparent);
  box-shadow:0 0 12px rgba(0,140,200,.2);
  pointer-events:none;z-index:2;
}
/* Sun glow on horizon */
.sun-glow{
  position:fixed;bottom:100px;left:50%;
  transform:translateX(-50%);
  width:300px;height:80px;
  background:radial-gradient(ellipse 50% 100% at 50% 100%,rgba(255,160,40,.12),transparent 70%);
  pointer-events:none;z-index:2;
  animation:sunBreath 4s ease-in-out infinite;
}
@keyframes sunBreath{0%,100%{opacity:.6}50%{opacity:1}}

/* ── Ocean waves ── */
.wave{
  position:fixed;left:0;right:0;
  height:3px;border-radius:50%;
  background:linear-gradient(90deg,transparent,rgba(0,180,220,.25),rgba(0,220,255,.35),rgba(0,180,220,.25),transparent);
  pointer-events:none;z-index:2;
  animation:waveRoll 3s ease-in-out infinite;
}
@keyframes waveRoll{0%,100%{transform:scaleX(.9);opacity:.4}50%{transform:scaleX(1.05);opacity:.8}}

/* ── Stars/sky ── */
.star{position:fixed;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:var(--sb)}}

/* ── Crosshair reticle bg ── */
.reticle-bg{
  position:fixed;top:50%;right:80px;
  transform:translateY(-50%);
  opacity:.05;pointer-events:none;z-index:1;
  animation:reticlePulse 4s ease-in-out infinite;
}
@keyframes reticlePulse{0%,100%{opacity:.04}50%{opacity:.08}}

/* ── HUD corners — ocean teal ── */
.hc{position:fixed;width:56px;height:56px;pointer-events:none;z-index:3;}
.hc.tl{top:18px;left:18px;border-top:1.5px solid rgba(0,180,220,.45);border-left:1.5px solid rgba(0,180,220,.45);}
.hc.tr{top:18px;right:18px;border-top:1.5px solid rgba(0,180,220,.45);border-right:1.5px solid rgba(0,180,220,.45);}
.hc.bl{bottom:18px;left:18px;border-bottom:1.5px solid rgba(0,180,220,.45);border-left:1.5px solid rgba(0,180,220,.45);}
.hc.br{bottom:18px;right:18px;border-bottom:1.5px solid rgba(0,180,220,.45);border-right:1.5px solid rgba(0,180,220,.45);}
.hc.tl::after{content:'';position:absolute;top:-1.5px;left:60px;width:10px;height:1.5px;background:rgba(0,180,220,.4);}
.hc.tr::after{content:'';position:absolute;top:-1.5px;right:60px;width:10px;height:1.5px;background:rgba(0,180,220,.4);}

/* ── Fine grid ── */
.grid{position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:linear-gradient(rgba(0,160,220,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,160,220,.03) 1px,transparent 1px);
  background-size:48px 48px;}

/* ── Scan ── */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,220,.1),transparent);animation:sc 7s linear infinite;pointer-events:none;z-index:2;}
@keyframes sc{from{top:0}to{top:100vh}}

/* ── Ocean particles ── */
.pt{position:fixed;border-radius:50%;animation:ptf linear infinite;pointer-events:none;z-index:2;}
@keyframes ptf{0%{transform:translate(0,0);opacity:var(--op);}100%{transform:translate(var(--px),var(--py));opacity:0;}}

/* ══ PAGE ══ */
.page{
  position:fixed;inset:0;bottom:120px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;gap:6px;
}

/* ── MAIN EMBLEM — crosshair + anchor ── */
.emblem{
  width:96px;height:96px;border-radius:50%;
  border:2px solid rgba(0,180,220,.55);
  background:radial-gradient(circle at 38% 32%,rgba(0,60,120,.4),rgba(0,0,0,.95));
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:6px;
  animation:embIn .8s cubic-bezier(.17,.67,.3,1.3) both,embGlow 3s 1s ease-in-out infinite;
}
@keyframes embIn{from{opacity:0;transform:scale(.3) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes embGlow{
  0%,100%{box-shadow:0 0 16px rgba(0,180,220,.3)}
  50%{box-shadow:0 0 40px rgba(0,200,240,.85),0 0 80px rgba(0,160,200,.2)}
}
.er1{position:absolute;inset:-9px;border-radius:50%;border:1.5px solid transparent;border-top-color:rgba(0,200,240,.8);animation:ro 3s linear infinite;}
.er2{position:absolute;inset:-17px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(0,160,200,.4);animation:ro2 6s linear infinite;}
.er3{position:absolute;inset:-25px;border-radius:50%;border:1px solid rgba(0,140,180,.08);animation:ro 14s linear infinite reverse;}
@keyframes ro{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ro2{from{transform:rotate(0)}to{transform:rotate(-360deg)}}

/* ── Name ── */
.welcome-txt{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:8px;color:rgba(255,255,255,.4);text-transform:uppercase;animation:fu .4s .45s ease both;}
.fullname{
  font-family:'Bebas Neue',sans-serif;font-size:68px;
  color:#ffffff;letter-spacing:4px;line-height:1;
  text-align:center;margin-bottom:4px;
  animation:nameIn .7s .55s ease both;
  text-shadow:0 0 24px rgba(0,180,220,.4),0 0 50px rgba(0,140,180,.15),0 2px 0 rgba(0,0,0,.9);
}
@keyframes nameIn{from{opacity:0;letter-spacing:16px}to{opacity:1;letter-spacing:4px}}

/* ── Title banner ── */
.title-banner{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  border:1px solid rgba(0,180,220,.28);
  background:rgba(0,20,50,.25);
  padding:10px 32px;margin-bottom:6px;
  position:relative;overflow:hidden;
  animation:fu .5s .7s ease both;min-width:310px;
}
.title-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(0,200,240,.7),transparent);}
.title-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,160,200,.35),transparent);}
.tb-shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,180,220,.05),transparent);animation:tbS 4s ease-in-out infinite;}
@keyframes tbS{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.tb-main{font-family:'Barlow Condensed',sans-serif;font-size:20px;letter-spacing:5px;color:#ffffff;text-transform:uppercase;font-weight:700;line-height:1;}
.tb-role{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:4px;color:#00b8e0;text-transform:uppercase;font-weight:600;}
.tb-dept{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.42);text-transform:uppercase;}
.tb-co{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,180,220,.4);text-transform:uppercase;}


.passion-strip{
  display:flex;align-items:center;gap:0;
  border:1px solid rgba(0,160,200,.2);
  background:rgba(0,0,0,.45);
  margin-bottom:4px;
  animation:fu .5s .84s ease both;
}
.passion{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 24px;border-right:1px solid rgba(0,160,200,.15);
  position:relative;overflow:hidden;
}
.passion:last-child{border-right:none;}
.passion-anim{
  width:60px;height:44px;
  display:flex;align-items:center;justify-content:center;
}
.p-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,200,240,.55);text-transform:uppercase;}

/* Motorcycle bob */
.moto-bob{animation:motoBob 1.8s ease-in-out infinite;transform-origin:center bottom;}
@keyframes motoBob{0%,100%{transform:translateY(0) rotate(-2deg)}45%{transform:translateY(-5px) rotate(-3deg)}75%{transform:translateY(-2px) rotate(-1.5deg)}}
/* Scope pulse */
.scope-pulse{animation:scopePulse 2.5s ease-in-out infinite;}
@keyframes scopePulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
/* Wave bob */
.wave-bob{animation:waveBob 2.2s ease-in-out infinite;}
@keyframes waveBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Wheel spin */
.wspin{animation:wsp .4s linear infinite;transform-origin:center;}
@keyframes wsp{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Status ── */
.status-row{display:flex;align-items:center;gap:16px;margin-bottom:4px;animation:fu .4s .96s ease both;}
.st-item{display:flex;align-items:center;gap:5px;}
.st-dot{width:6px;height:6px;border-radius:50%;animation:stP 2s ease-in-out infinite;}
@keyframes stP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.st-dot.on{background:#00d890;box-shadow:0 0 6px rgba(0,200,140,.7);}
.st-dot.sys{background:#00b8e0;box-shadow:0 0 6px rgba(0,180,220,.7);animation-delay:.5s;}
.st-dot.rdy{background:#ffc800;box-shadow:0 0 6px rgba(200,160,0,.7);animation-delay:1s;}
.st-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;}

/* ── Progress ── */
.pbar-wrap{width:300px;animation:fu .4s 1.08s ease both;}
.pbar-top{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:5px;}
.pbar-track{width:100%;height:5px;background:rgba(0,160,200,.1);border:1px solid rgba(0,180,220,.28);overflow:hidden;}
.pbar-fill{height:100%;width:0%;background:linear-gradient(90deg,#001830,#0050aa,#0090d0,#00c0e8);background-size:300% 100%;animation:pf 6s 1.12s ease forwards,ps 4s 1.12s linear infinite;position:relative;}
.pbar-fill::after{content:'';position:absolute;right:0;top:0;width:14px;height:100%;background:rgba(0,220,255,.6);filter:blur(3px);}
@keyframes pf{0%{width:0%}40%{width:50%}70%{width:76%}90%{width:91%}100%{width:100%}}
@keyframes ps{0%{background-position:0%}100%{background-position:300%}}
.pbar-ticks{display:flex;justify-content:space-between;margin-top:3px;}
.ptick{width:1px;height:4px;background:rgba(0,180,220,.2);}
.sys-txt{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(0,200,240,.45);text-transform:uppercase;margin-top:5px;text-align:center;animation:fu .4s 2.5s ease both;}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Ocean scene at bottom ── */
.ocean-scene{
  position:fixed;bottom:0;left:0;right:0;height:120px;
  pointer-events:none;z-index:3;
}

.corner{position:fixed;font-family:'DM Mono',monospace;font-size:8px;color:rgba(0,180,220,.2);letter-spacing:2px;z-index:1;}
.ctop{top:20px;left:84px;}.cbot{bottom:128px;right:20px;}

/* ══ SPECIAL ANIMATIONS ══ */

/* ── Shooting star streaks across sky ── */
.shooting-star{
  position:fixed;top:var(--sy);
  width:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),rgba(200,240,255,.6),transparent);
  pointer-events:none;z-index:4;
  border-radius:1px;
  animation:shootStar var(--sd) ease-in-out infinite;
  animation-delay:var(--sdelay);
  opacity:0;
}
@keyframes shootStar{
  0%{left:-10%;width:0;opacity:0;}
  5%{opacity:1;width:120px;}
  40%{opacity:1;width:160px;}
  60%{opacity:0;width:80px;}
  100%{left:110%;width:0;opacity:0;}
}

/* ── Bullet fires from left — travels across screen ── */
.bullet{
  position:fixed;
  top:50%;
  width:8px;height:3px;
  background:linear-gradient(90deg,rgba(255,220,100,.9),rgba(255,180,60,.6));
  border-radius:50%;
  box-shadow:0 0 6px rgba(255,200,80,.8),0 0 14px rgba(255,160,40,.4);
  pointer-events:none;z-index:9;
  animation:bulletFly 4s ease-in-out infinite;
  animation-delay:2s;
  opacity:0;
}
@keyframes bulletFly{
  0%{left:-2%;opacity:0;width:8px;}
  2%{opacity:1;width:20px;left:0%;}
  3%{width:30px;}
  60%{opacity:1;width:20px;left:90%;}
  62%{left:96%;opacity:0;width:8px;}
  100%{left:100%;opacity:0;}
}

/* ── Muzzle flash — left side where bullet fires from ── */
.muzzle-flash{
  position:fixed;
  left:20px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;z-index:9;
  animation:muzzleFlash 4s ease-in-out infinite;
  animation-delay:2s;
  opacity:0;
}
@keyframes muzzleFlash{
  0%,100%{opacity:0;}
  1.5%{opacity:1;}
  2.5%{opacity:0;}
  3%{opacity:.5;}
  3.5%{opacity:0;}
}

/* ── Target impact — bullseye hit on crosshair ── */
.target-hit{
  position:fixed;
  right:110px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;z-index:9;
  animation:targetHit 4s ease-in-out infinite;
  animation-delay:2s;
  opacity:0;
}
@keyframes targetHit{
  0%,55%,100%{opacity:0;}
  60%{opacity:1;}
  65%{opacity:0;}
  68%{opacity:.6;}
  72%{opacity:0;}
}

/* ── Impact spark ring on target ── */
.impact-ring{
  position:fixed;right:130px;top:50%;
  transform:translate(50%,-50%);
  border-radius:50%;
  border:2px solid rgba(255,200,80,0);
  pointer-events:none;z-index:8;
  animation:impactRing 4s ease-in-out infinite;
  animation-delay:2s;
}
@keyframes impactRing{
  0%,58%,100%{width:0;height:0;border-color:rgba(255,200,80,0);opacity:0;}
  60%{width:4px;height:4px;border-color:rgba(255,220,100,.9);opacity:1;}
  65%{width:40px;height:40px;border-color:rgba(255,180,60,.5);opacity:.8;}
  72%{width:70px;height:70px;border-color:rgba(255,140,40,.0);opacity:0;}
}

/* ── Motorcycle rides across bottom ocean scene ── */
.moto-ride{
  position:fixed;
  bottom:108px;
  pointer-events:none;z-index:5;
  animation:motoRide 7s cubic-bezier(.25,.1,.25,1) infinite;
  animation-delay:1s;
}
@keyframes motoRide{
  0%{left:-200px;opacity:0;}
  5%{opacity:1;}
  88%{opacity:1;}
  100%{left:110vw;opacity:0;}
}
.moto-lean{
  animation:motoLean .35s ease-in-out infinite alternate;
  transform-origin:center bottom;
}
@keyframes motoLean{from{transform:rotate(-3deg)}to{transform:rotate(-4.5deg) translateY(-2px)}}

/* Moto wheel spin on ride */
.mwr{animation:mwrs .25s linear infinite;transform-origin:center;}
@keyframes mwrs{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── Moto speed blur streaks when riding ── */
.moto-streak{
  position:fixed;bottom:118px;
  height:1.5px;border-radius:1px;
  background:linear-gradient(90deg,rgba(0,180,220,.5),rgba(0,220,255,.2),transparent);
  pointer-events:none;z-index:4;
  animation:motoStreak 7s cubic-bezier(.25,.1,.25,1) infinite;
}
@keyframes motoStreak{
  0%{left:-60%;width:0%;opacity:0;}
  5%{opacity:.8;}
  88%{opacity:.6;}
  100%{left:110%;width:45%;opacity:0;}
}

/* ── Wave crash on shore ── */
.wave-crash{
  position:fixed;bottom:108px;left:0;right:0;
  height:8px;
  pointer-events:none;z-index:4;
  animation:waveCrash 3s ease-in-out infinite;
}
@keyframes waveCrash{
  0%,100%{opacity:0;transform:scaleX(.8) scaleY(.5);}
  30%{opacity:.6;transform:scaleX(1.05) scaleY(1);}
  60%{opacity:.8;transform:scaleX(1.1) scaleY(1.3);}
  80%{opacity:.4;transform:scaleX(1.15) scaleY(.8);}
}

/* ── Lightning on horizon ── */
.lightning-bolt{
  position:fixed;
  pointer-events:none;z-index:4;
  animation:lbolt 8s ease-in-out infinite;
  opacity:0;
}
@keyframes lbolt{
  0%,100%{opacity:0;}
  10%{opacity:0;}10.2%{opacity:1;}10.5%{opacity:0;}10.7%{opacity:.6;}11%{opacity:0;}
  40%{opacity:0;}40.2%{opacity:.7;}40.4%{opacity:0;}
}
.lightning-flash{
  position:fixed;inset:0;
  pointer-events:none;z-index:3;
  animation:lflash 8s ease-in-out infinite;
  opacity:0;
}
@keyframes lflash{
  0%,100%{opacity:0;background:transparent;}
  10%{opacity:0;}10.2%{opacity:.3;background:rgba(200,220,255,.08);}10.5%{opacity:0;}
  40%{opacity:0;}40.2%{opacity:.2;background:rgba(200,220,255,.06);}40.5%{opacity:0;}
}

/* ── Scope lock-on animation — reticle zooms in ── */
.scope-lock{
  position:fixed;right:70px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;z-index:6;
  animation:scopeLock 4s ease-in-out infinite;
  animation-delay:2s;
  opacity:0;
}
@keyframes scopeLock{
  0%,55%,100%{opacity:0;transform:translateY(-50%) scale(1);}
  58%{opacity:0;transform:translateY(-50%) scale(1.5);}
  62%{opacity:1;transform:translateY(-50%) scale(1);}
  70%{opacity:.8;}
  75%{opacity:0;}
}

/* ── "CONFIRMED" text flash ── */
.confirmed{
  position:fixed;
  right:40px;top:calc(50% + 50px);
  font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:4px;
  color:rgba(0,255,120,.0);
  pointer-events:none;z-index:9;
  text-transform:uppercase;
  animation:confirmedFlash 4s ease-in-out infinite;
  animation-delay:2s;
  white-space:nowrap;
}
@keyframes confirmedFlash{
  0%,63%,100%{color:rgba(0,255,120,.0);}
  65%{color:rgba(0,255,120,.9);text-shadow:0 0 10px rgba(0,255,120,.8);}
  70%{color:rgba(0,255,120,.5);}
  74%{color:rgba(0,255,120,.0);}
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="scan"></div>
<div class="ocean-horizon"></div>
<div class="sun-glow"></div>

<!-- Stars -->
<div class="star" style="width:2px;height:2px;left:4%;top:5%;--sb:.9;animation-duration:2.2s;animation-delay:0s;"></div>
<div class="star" style="width:1px;height:1px;left:12%;top:3%;--sb:.7;animation-duration:1.8s;animation-delay:.4s;"></div>
<div class="star" style="width:2px;height:2px;left:22%;top:8%;--sb:.85;animation-duration:2.6s;animation-delay:.8s;"></div>
<div class="star" style="width:1px;height:1px;left:36%;top:4%;--sb:.6;animation-duration:2s;animation-delay:1.2s;"></div>
<div class="star" style="width:2px;height:2px;left:50%;top:7%;--sb:.9;animation-duration:2.4s;animation-delay:.2s;"></div>
<div class="star" style="width:1px;height:1px;left:62%;top:3%;--sb:.7;animation-duration:1.9s;animation-delay:.9s;"></div>
<div class="star" style="width:2px;height:2px;left:74%;top:9%;--sb:.8;animation-duration:2.1s;animation-delay:1.5s;"></div>
<div class="star" style="width:1px;height:1px;left:86%;top:5%;--sb:.65;animation-duration:2.3s;animation-delay:.6s;"></div>

<script>
  const n=sessionStorage.getItem("lms_fullname")||"David Watters";
  const r=sessionStorage.getItem("lms_role")||"Manager";
  const s=sessionStorage.getItem("lms_subrole")||"Maintenance";
  document.getElementById("displayName").textContent=n;

  const msgs=["Initializing workspace...","Loading maintenance data...","Syncing safety systems...","Almost ready...","Cleared hot..."];
  let p=0;const pEl=document.getElementById("pct");const sysEl=document.getElementById("sysTxt");
  const iv=setInterval(()=>{
    p=Math.min(99,p+Math.floor(Math.random()*2)+1);pEl.textContent=p+"%";
    if(p<20)sysEl.textContent=msgs[0];else if(p<40)sysEl.textContent=msgs[1];
    else if(p<60)sysEl.textContent=msgs[2];else if(p<80)sysEl.textContent=msgs[3];
    else sysEl.textContent=msgs[4];
    if(p>=99)clearInterval(iv);
  },100);
  const MIN_TIME=6000;const startTime=Date.now();
  const preload=document.createElement("link");preload.rel="prefetch";preload.href="index.html";document.head.appendChild(preload);
  function go(){const e=Date.now()-startTime;const r=Math.max(0,MIN_TIME-e);setTimeout(()=>{p=100;pEl.textContent="100%";clearInterval(iv);setTimeout(()=>{window.location.replace("index.html");},400);},r);}
  fetch("index.html",{method:"GET",cache:"force-cache"}).then(()=>go()).catch(()=>go());
  setTimeout(()=>{window.location.replace("index.html");},10000);

  // Wire to login.js username
  // Add "DWATTERS": "loader_DWATTERS.html" to LOADER_MAP
</script>
