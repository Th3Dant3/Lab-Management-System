<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scanner Network Monitor</title>

  <link rel="stylesheet" href="scanner-map.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

  <div class="animated-bg"></div>

  <div class="container">

    <!-- ================= TOP NAV ================= -->
    <div class="top-nav">
      <button class="back-btn" onclick="goBack()">← Dashboard</button>
    </div>

    <!-- ================= HEADER ================= -->
    <header class="header enhanced">

      <div class="header-left">
        <h1>Scanner Network Monitor</h1>
        <p class="sub">Real-time scanner & machine connectivity status</p>
      </div>

      <div class="header-actions">
  <button onclick="refreshScanner()">Refresh</button>
</div>

    </header>

    <!-- ================= SUMMARY ================= -->
    <section class="scanner-summary">

      <div class="summary-card ok">
        <span>Healthy</span>
        <strong id="healthyCount">—</strong>
      </div>

      <div class="summary-card warn">
        <span>Warnings</span>
        <strong id="warnCount">—</strong>
      </div>

      <div class="summary-card bad">
        <span>Critical</span>
        <strong id="criticalCount">—</strong>
      </div>

    </section>

    <!-- ================= LEGEND ================= -->
    <div class="legend">

      <span class="legend-item ok">● Healthy</span>
      <span class="legend-item warn">● Warning</span>
      <span class="legend-item bad">● Critical</span>

    </div>

    <!-- ================= MAIN PANEL ================= -->
    <div class="map-panel">
      <div id="app"></div>
    </div>

  </div>

  <!-- LOGIC -->
  <script>
    const s = document.createElement("script");
    s.src = "scanner-map.js?v=" + Date.now();
    document.body.appendChild(s);
  </script>

  <!-- ACTIONS -->
  <script>

    function goBack() {
      window.location.href = "index.html";
    }

    function refreshScanner() {
      location.reload();
    }

    function sendReport() {
      alert("Trigger Gmail Report (connect to Apps Script)");
    }

  </script>

</body>
</html>
