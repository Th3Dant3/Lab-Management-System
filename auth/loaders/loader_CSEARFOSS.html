<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080a07;overflow:hidden;height:100vh;width:100vw;}

/* ── Deep forest green / military ── */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(20,80,20,.2)   0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 10% 60%, rgba(10,50,10,.15)  0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 90% 60%, rgba(10,50,10,.15)  0%,transparent 55%),
    radial-gradient(ellipse 100% 28% at 50% 100%,rgba(30,100,20,.1) 0%,transparent 55%),
    linear-gradient(180deg,#050704 0%,#080a07 55%,#060805 100%);
  animation:bgp 6s ease-in-out infinite;
}
@keyframes bgp{0%,100%{opacity:.9}50%{opacity:1}}

/* ── Metal plate texture ── */
.metal{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 40px),
    repeating-linear-gradient(rgba(255,255,255,.008) 0,rgba(255,255,255,.008) 1px,transparent 1px,transparent 30px);
}

/* ── Green scan ── */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(50,200,50,.1),transparent);animation:sc 7s linear infinite;pointer-events:none;z-index:2;}
@keyframes sc{from{top:0}to{top:100vh}}

/* ── HUD corners — olive/military green ── */
.hc{position:fixed;width:55px;height:55px;pointer-events:none;z-index:3;}
.hc.tl{top:18px;left:18px;border-top:2px solid rgba(60,160,60,.45);border-left:2px solid rgba(60,160,60,.45);}
.hc.tr{top:18px;right:18px;border-top:2px solid rgba(60,160,60,.45);border-right:2px solid rgba(60,160,60,.45);}
.hc.bl{bottom:18px;left:18px;border-bottom:2px solid rgba(60,160,60,.45);border-left:2px solid rgba(60,160,60,.45);}
.hc.br{bottom:18px;right:18px;border-bottom:2px solid rgba(60,160,60,.45);border-right:2px solid rgba(60,160,60,.45);}

/* ── Particles ── */
.pt{position:fixed;border-radius:50%;animation:ptf linear infinite;pointer-events:none;z-index:2;}
@keyframes ptf{0%{transform:translate(0,0);opacity:var(--op);}100%{transform:translate(var(--px),var(--py));opacity:0;}}

/* ══ PAGE ══ */
.page{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;gap:8px;
}

/* ── Welcome / Name ── */
.welcome-txt{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:8px;color:rgba(255,255,255,.4);text-transform:uppercase;animation:fu .4s .3s ease both;}
.fullname{
  font-family:'Bebas Neue',sans-serif;font-size:68px;
  color:#ffffff;letter-spacing:5px;line-height:1;
  text-align:center;
  animation:nameIn .7s .4s ease both;
  text-shadow:0 0 24px rgba(60,200,60,.35),0 2px 0 rgba(0,0,0,.9);
}
@keyframes nameIn{from{opacity:0;letter-spacing:18px}to{opacity:1;letter-spacing:5px}}

/* ── 3 animated SVG vehicles — side by side ── */
.vehicles-wrap{
  display:flex;align-items:flex-end;gap:30px;
  margin:4px 0 6px;
  animation:fu .6s .55s ease both;
}
.vehicle-box{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.vehicle-svg{
  display:block;
  filter:drop-shadow(0 4px 12px rgba(60,180,60,.2));
}
.v-lbl{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:3px;
  color:rgba(80,200,80,.6);
  text-transform:uppercase;
}

/* Individual vehicle animations */
.moto-anim{animation:motoIdle 1.8s ease-in-out infinite;transform-origin:center bottom;}
@keyframes motoIdle{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-5px) rotate(-1deg)}70%{transform:translateY(-2px) rotate(.5deg)}}

.car-anim{animation:carIdle 2.2s ease-in-out infinite;transform-origin:center bottom;}
@keyframes carIdle{0%,100%{transform:translateY(0)}35%{transform:translateY(-4px)}65%{transform:translateY(-2px)}}

.truck-anim{animation:truckIdle 2s ease-in-out infinite;transform-origin:center bottom;}
@keyframes truckIdle{0%,100%{transform:translateY(0) rotate(0deg)}45%{transform:translateY(-6px) rotate(.5deg)}75%{transform:translateY(-3px)}}

/* Wheel spin for all vehicles */
.wheel-spin{animation:wSpin .5s linear infinite;transform-origin:center center;}
@keyframes wSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.wheel-spin-slow{animation:wSpin .7s linear infinite;transform-origin:center center;}

/* Exhaust puff */
.exhaust-puff{animation:puffOut .8s ease-out infinite;}
@keyframes puffOut{0%{transform:scale(.3) translateX(0);opacity:.6}100%{transform:scale(2) translateX(-18px);opacity:0}}
.exhaust-puff2{animation:puffOut .8s ease-out infinite;animation-delay:.27s;}
.exhaust-puff3{animation:puffOut .8s ease-out infinite;animation-delay:.54s;}

/* ── Role card ── */
.role-card{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  border:1px solid rgba(60,160,60,.28);
  background:rgba(0,20,0,.3);
  padding:9px 32px;
  position:relative;overflow:hidden;
  animation:fu .5s .72s ease both;
  min-width:290px;
}
.role-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(60,200,60,.6),transparent);}
.role-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(40,160,40,.35),transparent);}
.rc-shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(60,200,60,.05),transparent);animation:rcS 4s ease-in-out infinite;}
@keyframes rcS{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.rc-main{font-family:'Barlow Condensed',sans-serif;font-size:19px;letter-spacing:5px;color:#ffffff;text-transform:uppercase;font-weight:700;line-height:1;}
.rc-dept{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(100,220,100,.55);text-transform:uppercase;}
.rc-co{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(60,160,60,.4);text-transform:uppercase;}

/* ── Status dots ── */
.status-row{display:flex;align-items:center;gap:16px;animation:fu .4s .86s ease both;}
.st-item{display:flex;align-items:center;gap:5px;}
.st-dot{width:6px;height:6px;border-radius:50%;animation:stP 2s ease-in-out infinite;}
@keyframes stP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.st-dot.on{background:#00d890;box-shadow:0 0 6px rgba(0,200,140,.7);}
.st-dot.sys{background:#40cc40;box-shadow:0 0 6px rgba(40,200,40,.7);animation-delay:.5s;}
.st-dot.rdy{background:#ffc800;box-shadow:0 0 6px rgba(200,160,0,.7);animation-delay:1s;}
.st-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;}

/* ── Progress ── */
.pbar-wrap{width:300px;animation:fu .4s .98s ease both;}
.pbar-top{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:5px;}
.pbar-track{width:100%;height:5px;background:rgba(40,160,40,.1);border:1px solid rgba(60,160,60,.28);overflow:hidden;}
.pbar-fill{height:100%;width:0%;background:linear-gradient(90deg,#0a2008,#206020,#40aa40,#70d070);background-size:300% 100%;animation:pf 6s 1s ease forwards,ps 4s 1s linear infinite;position:relative;}
.pbar-fill::after{content:'';position:absolute;right:0;top:0;width:14px;height:100%;background:rgba(100,220,100,.6);filter:blur(3px);}
@keyframes pf{0%{width:0%}40%{width:50%}70%{width:76%}90%{width:91%}100%{width:100%}}
@keyframes ps{0%{background-position:0%}100%{background-position:300%}}
.pbar-ticks{display:flex;justify-content:space-between;margin-top:3px;}
.ptick{width:1px;height:4px;background:rgba(60,160,60,.2);}
.sys-txt{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(60,200,60,.45);text-transform:uppercase;margin-top:5px;text-align:center;animation:fu .4s 2.5s ease both;}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.corner{position:fixed;font-family:'DM Mono',monospace;font-size:8px;color:rgba(60,160,60,.2);letter-spacing:2px;z-index:1;}
.ctop{top:20px;left:84px;}.cbot{bottom:20px;right:84px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="metal"></div>
<div class="scan"></div>
<div class="hc tl"></div><div class="hc tr"></div>
<div class="hc bl"></div><div class="hc br"></div>
<div class="corner ctop">ZENNI LMS · MAINTENANCE</div>
<div class="corner cbot">SESSION ACTIVE</div>

<!-- Green particles -->
<div class="pt" style="width:2px;height:2px;left:12%;top:45%;background:#40cc40;--px:-35px;--py:-110px;--op:.7;animation-duration:4s;animation-delay:0s;"></div>
<div class="pt" style="width:3px;height:3px;left:24%;top:58%;background:#60e060;--px:-45px;--py:-95px;--op:.8;animation-duration:3.5s;animation-delay:.6s;"></div>
<div class="pt" style="width:2px;height:2px;left:76%;top:52%;background:#30b030;--px:40px;--py:-105px;--op:.7;animation-duration:4.2s;animation-delay:1.1s;"></div>
<div class="pt" style="width:3px;height:3px;left:86%;top:60%;background:#50d050;--px:36px;--py:-90px;--op:.8;animation-duration:3.8s;animation-delay:.4s;"></div>

<div class="page">

  <div class="welcome-txt">Welcome back</div>
  <div class="fullname" id="displayName">Chris Searfoss</div>

  <!-- ══ 3 ANIMATED SVG VEHICLES ══ -->
  <div class="vehicles-wrap">

    <!-- MOTORCYCLE -->
    <div class="vehicle-box">
      <svg class="vehicle-svg" width="110" height="72" viewBox="0 0 110 72">
        <defs>
          <radialGradient id="mWhl" cx="40%" cy="38%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#0d0d0d"/></radialGradient>
          <linearGradient id="mBody" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2a40"/><stop offset="100%" stop-color="#0e1828"/></linearGradient>
        </defs>
        <g class="moto-anim">
          <!-- Exhaust smoke -->
          <circle cx="8" cy="52" r="5" fill="rgba(120,120,120,.18)" class="exhaust-puff"/>
          <circle cx="6" cy="50" r="4" fill="rgba(120,120,120,.14)" class="exhaust-puff2"/>
          <!-- Rear wheel -->
          <circle cx="18" cy="56" r="14" fill="url(#mWhl)" stroke="#1a1a1a" stroke-width="3"/>
          <g class="wheel-spin" style="transform-origin:18px 56px">
            <line x1="18" y1="44" x2="18" y2="68" stroke="#222" stroke-width="1.5"/>
            <line x1="6"  y1="56" x2="30" y2="56" stroke="#222" stroke-width="1.5"/>
            <line x1="10" y1="47" x2="26" y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
            <line x1="26" y1="47" x2="10" y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
          </g>
          <circle cx="18" cy="56" r="5" fill="#0060cc"/>
          <circle cx="18" cy="56" r="2.5" fill="#40a0ff"/>
          <!-- Front wheel -->
          <circle cx="90" cy="56" r="13" fill="url(#mWhl)" stroke="#1a1a1a" stroke-width="3"/>
          <g class="wheel-spin" style="transform-origin:90px 56px">
            <line x1="90" y1="45" x2="90" y2="67" stroke="#222" stroke-width="1.5"/>
            <line x1="79" y1="56" x2="101" y2="56" stroke="#222" stroke-width="1.5"/>
            <line x1="82" y1="48" x2="98" y2="64" stroke="#1a1a1a" stroke-width="1.2"/>
            <line x1="98" y1="48" x2="82" y2="64" stroke="#1a1a1a" stroke-width="1.2"/>
          </g>
          <circle cx="90" cy="56" r="5" fill="#0060cc"/>
          <circle cx="90" cy="56" r="2.5" fill="#40a0ff"/>
          <!-- Body -->
          <path d="M18 52 Q30 32 46 28 Q62 24 76 32 Q88 40 90 50" fill="url(#mBody)" stroke="#1e2a3e" stroke-width="1.5"/>
          <!-- Tank -->
          <path d="M46 28 Q62 22 72 28 Q72 36 62 36 L46 36Z" fill="#1a2a40" stroke="#243050" stroke-width="1"/>
          <!-- Fairing -->
          <path d="M76 32 Q90 36 96 44 Q98 50 94 54 Q88 50 90 50" fill="#1a2a40" stroke="#1e2a3e" stroke-width="1"/>
          <!-- Headlight -->
          <circle cx="94" cy="46" r="4" fill="rgba(255,220,150,.9)">
            <animate attributeName="opacity" values=".85;1;.85" dur=".25s" repeatCount="indefinite"/>
          </circle>
          <!-- Tail light -->
          <rect x="14" y="48" width="7" height="4" rx="1.5" fill="#ff2020">
            <animate attributeName="opacity" values=".7;1;.7" dur=".6s" repeatCount="indefinite"/>
          </rect>
          <!-- Fork -->
          <line x1="80" y1="34" x2="90" y2="54" stroke="#555" stroke-width="5" stroke-linecap="round"/>
          <line x1="84" y1="34" x2="94" y2="54" stroke="#555" stroke-width="5" stroke-linecap="round"/>
          <!-- Rider -->
          <ellipse cx="56" cy="22" rx="9" ry="8" fill="#0a0a14"/>
          <path d="M56 30 Q50 38 46 44" stroke="#0a0a14" stroke-width="7" stroke-linecap="round" fill="none"/>
          <path d="M56 34 Q64 32 78 28" stroke="#0a0a14" stroke-width="6" stroke-linecap="round" fill="none"/>
          <!-- Helmet visor -->
          <path d="M50 20 Q56 16 62 20 Q62 26 56 27 Q50 26 50 20Z" fill="rgba(40,100,200,.3)" stroke="rgba(80,140,220,.4)" stroke-width=".8"/>
        </g>
      </svg>
      <div class="v-lbl">Moto</div>
    </div>

    <!-- CAR -->
    <div class="vehicle-box">
      <svg class="vehicle-svg" width="130" height="72" viewBox="0 0 130 72">
        <defs>
          <radialGradient id="cWhl" cx="40%" cy="38%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#0d0d0d"/></radialGradient>
          <linearGradient id="cBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e1e2e"/><stop offset="100%" stop-color="#14141e"/></linearGradient>
          <linearGradient id="cRoof" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#18182a"/><stop offset="100%" stop-color="#121220"/></linearGradient>
        </defs>
        <g class="car-anim">
          <!-- Body -->
          <rect x="6" y="38" width="118" height="22" rx="4" fill="url(#cBody)" stroke="#202030" stroke-width="1.5"/>
          <!-- Roof -->
          <path d="M22 38 Q28 18 50 14 Q80 10 100 14 Q115 18 118 38Z" fill="url(#cRoof)" stroke="#1a1a2a" stroke-width="1.5"/>
          <!-- Windows -->
          <path d="M30 38 Q34 22 52 18 Q65 16 65 38Z" fill="rgba(60,120,200,.22)" stroke="rgba(80,140,220,.3)" stroke-width="1"/>
          <path d="M68 38 L68 16 Q84 15 100 20 Q112 26 114 38Z" fill="rgba(60,120,200,.22)" stroke="rgba(80,140,220,.3)" stroke-width="1"/>
          <!-- Window gloss -->
          <path d="M32 36 Q36 24 50 20" fill="none" stroke="rgba(180,220,255,.2)" stroke-width="1"/>
          <!-- Door lines -->
          <line x1="66" y1="38" x2="66" y2="58" stroke="#1a1a28" stroke-width="1.5"/>
          <line x1="66" y1="48" x2="124" y2="48" stroke="#1a1a28" stroke-width="1"/>
          <!-- Front headlights -->
          <rect x="118" y="40" width="8" height="5" rx="2" fill="rgba(255,220,150,.9)">
            <animate attributeName="opacity" values=".85;1;.85" dur=".2s" repeatCount="indefinite"/>
          </rect>
          <rect x="118" y="48" width="5" height="3" rx="1" fill="rgba(255,210,130,.7)">
            <animate attributeName="opacity" values=".7;1;.7" dur=".2s" begin=".1s" repeatCount="indefinite"/>
          </rect>
          <!-- Tail lights -->
          <rect x="4"  y="40" width="7" height="5" rx="2" fill="#ff2020">
            <animate attributeName="opacity" values=".7;1;.7" dur=".55s" repeatCount="indefinite"/>
          </rect>
          <rect x="4"  y="48" width="5" height="4" rx="1.5" fill="#cc0000">
            <animate attributeName="opacity" values=".6;.9;.6" dur=".55s" begin=".15s" repeatCount="indefinite"/>
          </rect>
          <!-- Front wheel -->
          <circle cx="100" cy="58" r="12" fill="url(#cWhl)" stroke="#1a1a1a" stroke-width="2.5"/>
          <g class="wheel-spin-slow" style="transform-origin:100px 58px">
            <line x1="100" y1="48" x2="100" y2="68" stroke="#222" stroke-width="1.5"/>
            <line x1="90"  y1="58" x2="110" y2="58" stroke="#222" stroke-width="1.5"/>
            <line x1="93"  y1="51" x2="107" y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
            <line x1="107" y1="51" x2="93"  y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
          </g>
          <circle cx="100" cy="58" r="4" fill="#206020"/>
          <circle cx="100" cy="58" r="2" fill="#40cc40"/>
          <!-- Rear wheel -->
          <circle cx="30" cy="58" r="12" fill="url(#cWhl)" stroke="#1a1a1a" stroke-width="2.5"/>
          <g class="wheel-spin-slow" style="transform-origin:30px 58px">
            <line x1="30" y1="48" x2="30" y2="68" stroke="#222" stroke-width="1.5"/>
            <line x1="20" y1="58" x2="40" y2="58" stroke="#222" stroke-width="1.5"/>
            <line x1="23" y1="51" x2="37" y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
            <line x1="37" y1="51" x2="23" y2="65" stroke="#1a1a1a" stroke-width="1.2"/>
          </g>
          <circle cx="30" cy="58" r="4" fill="#206020"/>
          <circle cx="30" cy="58" r="2" fill="#40cc40"/>
          <!-- Exhaust -->
          <circle cx="8" cy="58" r="4" fill="rgba(120,120,120,.15)" class="exhaust-puff"/>
          <circle cx="6" cy="56" r="3" fill="rgba(120,120,120,.12)" class="exhaust-puff2"/>
        </g>
      </svg>
      <div class="v-lbl">Car</div>
    </div>

    <!-- TRUCK -->
    <div class="vehicle-box">
      <svg class="vehicle-svg" width="140" height="80" viewBox="0 0 140 80">
        <defs>
          <radialGradient id="tWhl" cx="40%" cy="38%"><stop offset="0%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#0d0d0d"/></radialGradient>
          <linearGradient id="tCab" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1e2818"/><stop offset="100%" stop-color="#141c10"/></linearGradient>
          <linearGradient id="tBed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#182018"/><stop offset="100%" stop-color="#101610"/></linearGradient>
        </defs>
        <g class="truck-anim">
          <!-- Bed -->
          <rect x="4"  y="42" width="74" height="22" rx="2" fill="url(#tBed)" stroke="#182018" stroke-width="1.5"/>
          <!-- Bed rails -->
          <line x1="4"  y1="42" x2="78" y2="42" stroke="#20301a" stroke-width="2.5"/>
          <line x1="4"  y1="52" x2="78" y2="52" stroke="#182018" stroke-width="1"/>
          <line x1="4"  y1="62" x2="78" y2="62" stroke="#182018" stroke-width="1"/>
          <line x1="26" y1="42" x2="26" y2="64" stroke="#182018" stroke-width="1"/>
          <line x1="52" y1="42" x2="52" y2="64" stroke="#182018" stroke-width="1"/>
          <!-- Cab body -->
          <rect x="78" y="44" width="54" height="20" rx="3" fill="url(#tCab)" stroke="#1e2818" stroke-width="1.5"/>
          <!-- Cab roof -->
          <path d="M82 44 Q86 24 100 20 Q118 18 128 26 Q134 32 132 44Z" fill="url(#tCab)" stroke="#1a2414" stroke-width="1.5"/>
          <!-- Cab window -->
          <path d="M88 44 Q90 28 102 24 Q114 22 124 30 Q130 36 130 44Z" fill="rgba(60,140,60,.18)" stroke="rgba(80,180,80,.25)" stroke-width="1"/>
          <path d="M92 42 Q94 30 104 26" fill="none" stroke="rgba(140,220,140,.18)" stroke-width="1"/>
          <!-- Exhaust stack -->
          <rect x="126" y="10" width="5" height="20" rx="2" fill="#222" stroke="#333" stroke-width="1"/>
          <circle cx="128" cy="10" r="4" fill="rgba(80,80,80,.2)" class="exhaust-puff"/>
          <circle cx="128" cy="8"  r="3" fill="rgba(80,80,80,.15)" class="exhaust-puff2"/>
          <circle cx="130" cy="6"  r="2" fill="rgba(80,80,80,.1)"  class="exhaust-puff3"/>
          <!-- Headlights -->
          <rect x="130" y="46" width="8" height="5" rx="2" fill="rgba(255,220,150,.9)">
            <animate attributeName="opacity" values=".85;1;.85" dur=".2s" repeatCount="indefinite"/>
          </rect>
          <rect x="130" y="54" width="6" height="4" rx="1" fill="rgba(255,210,130,.7)">
            <animate attributeName="opacity" values=".7;1;.7" dur=".2s" begin=".1s" repeatCount="indefinite"/>
          </rect>
          <!-- Tail lights -->
          <rect x="4" y="44" width="6" height="5" rx="1.5" fill="#ff2020">
            <animate attributeName="opacity" values=".7;1;.7" dur=".6s" repeatCount="indefinite"/>
          </rect>
          <!-- Front axle wheels (dual rear) -->

      <div class="ptick"></div><div class="ptick"></div><div class="ptick"></div><div class="ptick"></div>

</div>

<script>
  const n=sessionStorage.getItem("lms_fullname")||"Chris Searfoss";
  const r=sessionStorage.getItem("lms_role")||"Supervisor";
  const s=sessionStorage.getItem("lms_subrole")||"Maintenance";
  document.getElementById("displayName").textContent=n;
  document.getElementById("displayRole").textContent=s+" "+r;

  const msgs=["Preparing your workspace...","Loading maintenance data...","Syncing systems...","Almost ready...","Full throttle ahead..."];
  let p=0;const pEl=document.getElementById("pct");const sysEl=document.getElementById("sysTxt");
  const iv=setInterval(()=>{
    p=Math.min(99,p+Math.floor(Math.random()*2)+1);pEl.textContent=p+"%";
    if(p<20)sysEl.textContent=msgs[0];else if(p<40)sysEl.textContent=msgs[1];
    else if(p<60)sysEl.textContent=msgs[2];else if(p<80)sysEl.textContent=msgs[3];
    else sysEl.textContent=msgs[4];
    if(p>=99)clearInterval(iv);
  },100);
  const MIN_TIME=6000;const startTime=Date.now();
  const preload=document.createElement("link");preload.rel="prefetch";preload.href="index.html";document.head.appendChild(preload);
  function go(){const e=Date.now()-startTime;const r=Math.max(0,MIN_TIME-e);setTimeout(()=>{p=100;pEl.textContent="100%";clearInterval(iv);setTimeout(()=>{window.location.replace("../../index.html");},400);},r);}
  fetch("index.html",{method:"GET",cache:"force-cache"}).then(()=>go()).catch(()=>go());
  setTimeout(()=>{window.location.replace("../../index.html");},10000);
</script>
