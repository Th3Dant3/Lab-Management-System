<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#04080f;overflow:hidden;height:100vh;width:100vw;}

/* ── Grizzlies colors: Navy #12173E, Light Blue #5D9DD5, Gold #F4B942 ── */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(18,23,62,.5) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 20% 70%, rgba(93,157,213,.1) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(93,157,213,.1) 0%,transparent 55%),
    radial-gradient(ellipse 100% 30% at 50% 100%, rgba(244,185,66,.08) 0%,transparent 55%),
    #04080f;
  animation:bgp 5s ease-in-out infinite;
}
@keyframes bgp{0%,100%{opacity:.88}50%{opacity:1}}

/* ── Subtle grid ── */
.grid-bg{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    linear-gradient(rgba(93,157,213,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(93,157,213,.04) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ── Court lines at bottom ── */
.court{
  position:fixed;bottom:0;left:0;right:0;
  height:70px;
  background:linear-gradient(180deg,#0a0e1a,#0d1220);
  border-top:2px solid rgba(93,157,213,.4);
  z-index:3;pointer-events:none;
}
.court::before{
  content:'';position:absolute;
  top:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#5d9dd5,#a0c8e8,#5d9dd5,transparent);
  box-shadow:0 0 12px rgba(93,157,213,.6),0 0 24px rgba(93,157,213,.2);
}
/* 3-point arc hint */
.court::after{
  content:'';position:absolute;
  top:10px;left:50%;transform:translateX(-50%);
  width:120px;height:60px;
  border:1px solid rgba(93,157,213,.2);
  border-radius:60px 60px 0 0;
  border-bottom:none;
}
/* Center court circle */
.court-circle{
  position:absolute;
  top:5px;left:50%;transform:translateX(-50%);
  width:50px;height:50px;
  border-radius:50%;
  border:1px solid rgba(93,157,213,.18);
}
.court-line{
  position:absolute;top:0;bottom:0;left:50%;
  width:1px;background:rgba(93,157,213,.12);
}

/* ── Gold shimmer particles ── */
.gp{
  position:fixed;border-radius:50%;
  background:#f4b942;
  animation:gpf 4s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
@keyframes gpf{0%,100%{opacity:.1;transform:translateY(0) scale(1)}50%{opacity:.6;transform:translateY(-16px) scale(1.2)}}

/* ── Scan ── */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(93,157,213,.15),transparent);animation:sc 6s linear infinite;pointer-events:none;z-index:2;}
@keyframes sc{from{top:0}to{top:100vh}}

/* ══ PAGE ══ */
.page{
  position:fixed;inset:0;bottom:70px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;gap:6px;
}

.welcome-txt{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:8px;color:rgba(255,255,255,.55);text-transform:uppercase;animation:fu .4s .3s ease both;}

.fullname{
  font-family:'Bebas Neue',sans-serif;font-size:66px;color:#ffffff;
  letter-spacing:5px;line-height:1;
  animation:nameIn .6s .4s ease both;
  text-shadow:0 0 25px rgba(93,157,213,.5),0 0 50px rgba(18,23,62,.8),0 2px 0 rgba(0,0,0,.8);
}
@keyframes nameIn{from{opacity:0;letter-spacing:18px}to{opacity:1;letter-spacing:5px}}

/* ── GRIZZLIES LOGO BADGE ── */
.grizz-badge{
  display:flex;align-items:center;gap:16px;
  border:2px solid rgba(93,157,213,.4);
  background:rgba(18,23,62,.5);
  padding:12px 24px;
  margin-top:4px;
  animation:fu .5s .55s ease both;
  position:relative;overflow:hidden;
}
.grizz-badge::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(93,157,213,.05),transparent);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

/* Grizzly bear paw CSS */
.paw-icon{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  filter:drop-shadow(0 0 6px rgba(93,157,213,.5));
}
.paw-main{
  width:36px;height:36px;
  border-radius:50% 50% 40% 40%;
  background:linear-gradient(135deg,#5d9dd5,#3a7ab5);
  position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.paw-main::before{
  content:'';position:absolute;
  top:-2px;left:50%;transform:translateX(-50%);
  width:12px;height:8px;
  border-radius:50%;
  background:linear-gradient(135deg,#5d9dd5,#3a7ab5);
}
/* Toe pads */
.paw-toes{display:flex;gap:3px;margin-top:1px;}
.paw-toe{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,#5d9dd5,#3a7ab5);box-shadow:0 2px 4px rgba(0,0,0,.3);}
/* Claws */
.paw-claws{display:flex;gap:4px;margin-top:2px;}
.paw-claw{width:2px;height:8px;background:rgba(244,185,66,.7);border-radius:1px;transform:rotate(0deg);}

.grizz-text{display:flex;flex-direction:column;gap:2px;}
.grizz-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:#ffffff;line-height:1;text-shadow:0 0 12px rgba(93,157,213,.4);}
.grizz-city{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:#f4b942;text-transform:uppercase;}
.grizz-motto{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(93,157,213,.7);text-transform:uppercase;}

/* ── ROLE ── */
.role-badge{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(93,157,213,.35);
  background:rgba(18,23,62,.4);
  padding:6px 22px;
  animation:fu .4s .72s ease both;
}
.role-badge span{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:4px;color:#ffffff;text-transform:uppercase;font-weight:600;}

/* ── Stats ── */
.stats{
  display:flex;align-items:center;gap:0;
  border:1px solid rgba(93,157,213,.2);
  background:rgba(0,0,0,.4);
  animation:fu .5s .85s ease both;
}
.stat{
  padding:8px 20px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  border-right:1px solid rgba(93,157,213,.15);
}
.stat:last-child{border-right:none;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#5d9dd5;letter-spacing:1px;line-height:1;text-shadow:0 0 10px rgba(93,157,213,.5);}
.stat-val.gold{color:#f4b942;text-shadow:0 0 10px rgba(244,185,66,.5);}
.stat-unit{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;}

/* ── Progress ── */
.pbar-wrap{width:320px;margin-top:8px;animation:fu .4s .98s ease both;}
.pbar-top{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:#ffffff;text-transform:uppercase;margin-bottom:6px;}
.pbar-track{width:100%;height:5px;background:rgba(93,157,213,.12);border:1px solid rgba(93,157,213,.3);overflow:hidden;}
.pbar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#12173e,#5d9dd5,#a0c8e8,#f4b942,#5d9dd5);
  background-size:300% 100%;
  animation:pf 6s 1s ease forwards,pshift 4s 1s linear infinite;
  position:relative;
}
.pbar-fill::after{content:'';position:absolute;right:0;top:0;width:14px;height:100%;background:rgba(244,185,66,.6);filter:blur(3px);}
@keyframes pf{0%{width:0%}40%{width:50%}70%{width:76%}90%{width:91%}100%{width:100%}}
@keyframes pshift{0%{background-position:0%}100%{background-position:300%}}
.sys-txt{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:5px;animation:fu .4s 1.1s ease both;}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.corner{position:fixed;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.18);letter-spacing:1px;z-index:1;}
.ctop{top:18px;left:22px;}.cbot{bottom:78px;right:22px;}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid-bg"></div>
<div class="scan"></div>

<!-- Gold particles -->
<div class="gp" style="width:3px;height:3px;left:8%;top:20%;animation-delay:0s;animation-duration:4s;"></div>
<div class="gp" style="width:2px;height:2px;left:18%;top:35%;animation-delay:.6s;animation-duration:3.8s;"></div>
<div class="gp" style="width:3px;height:3px;left:82%;top:22%;animation-delay:1.2s;animation-duration:4.2s;"></div>
<div class="gp" style="width:2px;height:2px;left:88%;top:45%;animation-delay:.4s;animation-duration:3.6s;"></div>
<div class="gp" style="width:3px;height:3px;left:72%;top:30%;animation-delay:1.8s;animation-duration:4.5s;"></div>
<div class="gp" style="width:2px;height:2px;left:25%;top:60%;animation-delay:2.2s;animation-duration:3.9s;"></div>
<div class="gp" style="width:2px;height:2px;left:55%;top:18%;animation-delay:.9s;animation-duration:4.1s;"></div>
<div class="gp" style="width:3px;height:3px;left:42%;top:72%;animation-delay:1.5s;animation-duration:3.7s;"></div>

<!-- Basketball court -->
<div class="court">
  <div class="court-circle"></div>
  <div class="court-line"></div>
</div>

<div class="corner ctop">ZENNI LMS · MANUFACTURING OPERATIONS</div>
<div class="corner cbot">SESSION ACTIVE</div>

<div class="page">
  <div class="welcome-txt">Welcome back</div>
  <div class="fullname" id="displayName">Beth Blake</div>

  <!-- Grizzlies badge -->
  <div class="grizz-badge">
    <div class="paw-icon">
      <div class="paw-main"></div>
      <div class="paw-toes">
        <div class="paw-toe"></div>
        <div class="paw-toe"></div>
        <div class="paw-toe"></div>
        <div class="paw-toe"></div>
      </div>
      <div class="paw-claws">
        <div class="paw-claw"></div>
        <div class="paw-claw"></div>
        <div class="paw-claw"></div>
        <div class="paw-claw"></div>
      </div>
    </div>
    <div class="grizz-text">
      <div class="grizz-name">Memphis Grizzlies</div>
      <div class="grizz-city">Memphis · Tennessee</div>
      <div class="grizz-motto">Grit &amp; Grind</div>
    </div>
  </div>

  <!-- Role -->
  <div class="role-badge">
    <span id="displayRole">Manager · Manufacturing Operations</span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="s1">--</div>
      <div class="stat-unit">Season W</div>
    </div>
    <div class="stat">
      <div class="stat-val gold" id="s2">--</div>
      <div class="stat-unit">Playoff</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s3">--</div>
      <div class="stat-unit">Years</div>
    </div>
  </div>

  <div class="pbar-wrap">
    <div class="pbar-top"><span>Loading Dashboard</span><span id="pct">0%</span></div>
    <div class="pbar-track"><div class="pbar-fill"></div></div>
  </div>
  <div class="sys-txt" id="sysTxt">Preparing your workspace...</div>
</div>

<script>
  const n=sessionStorage.getItem("lms_fullname")||"Beth Blake";
  const r=sessionStorage.getItem("lms_role")||"Manager";
  const s=sessionStorage.getItem("lms_subrole")||"Manufacturing Operation Program";
  document.getElementById("displayName").textContent=n;
  document.getElementById("displayRole").textContent=r+" · "+s;

  setTimeout(()=>{ animCount("s1",0,41,1200); },700);
  setTimeout(()=>{ animCount("s2",0,8,1000); },900);
  setTimeout(()=>{ animCount("s3",0,29,1100); },1100);
  function animCount(id,from,to,dur){
    const el=document.getElementById(id);if(!el)return;
    const steps=22;const inc=(to-from)/steps;let cur=from;let i=0;
    const iv=setInterval(()=>{cur+=inc;i++;el.textContent=Math.round(cur);if(i>=steps){el.textContent=to;clearInterval(iv);}},dur/steps);
  }

  const msgs=["Preparing your workspace...","Loading operations data...","Syncing production metrics...","Almost ready...","Dashboard loading..."];
  let p=0;
  const pEl=document.getElementById("pct");
  const sysEl=document.getElementById("sysTxt");
  const iv=setInterval(()=>{
    p=Math.min(99,p+Math.floor(Math.random()*2)+1);
    pEl.textContent=p+"%";
    if(p<20)sysEl.textContent=msgs[0];
    else if(p<40)sysEl.textContent=msgs[1];
    else if(p<60)sysEl.textContent=msgs[2];
    else if(p<80)sysEl.textContent=msgs[3];
    else sysEl.textContent=msgs[4];
    if(p>=99)clearInterval(iv);
  },100);

  const MIN_TIME=6000;const startTime=Date.now();
  const preload=document.createElement("link");preload.rel="prefetch";preload.href="index.html";document.head.appendChild(preload);
  function goToDashboard(){const e=Date.now()-startTime;const r=Math.max(0,MIN_TIME-e);setTimeout(()=>{p=100;pEl.textContent="100%";clearInterval(iv);setTimeout(()=>{window.location.replace("../../index.html");},400);},r);}
  fetch("index.html",{method:"GET",cache:"force-cache"}).then(()=>goToDashboard()).catch(()=>goToDashboard());
  setTimeout(()=>{window.location.replace("../../index.html");},10000);
</script>
</body>
</html>
