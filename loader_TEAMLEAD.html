<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#06080c;overflow:hidden;height:100vh;width:100vw;}

/* ── Clean dark Zenni bg ── */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 55% at 50% 30%, rgba(0,140,200,.1) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at 20% 70%, rgba(0,80,160,.07) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,80,160,.07) 0%,transparent 55%),
    radial-gradient(ellipse 100% 25% at 50% 100%, rgba(0,100,180,.08) 0%,transparent 55%),
    #06080c;
  animation:bgp 6s ease-in-out infinite;
}
@keyframes bgp{0%,100%{opacity:.9}50%{opacity:1}}

/* ── Subtle grid ── */
.grid{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    linear-gradient(rgba(0,160,220,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,160,220,.04) 1px,transparent 1px);
  background-size:50px 50px;
}

/* ── HUD corner brackets ── */
.hc{position:fixed;width:60px;height:60px;pointer-events:none;z-index:3;}
.hc.tl{top:18px;left:18px;border-top:2px solid rgba(0,160,220,.35);border-left:2px solid rgba(0,160,220,.35);}
.hc.tr{top:18px;right:18px;border-top:2px solid rgba(0,160,220,.35);border-right:2px solid rgba(0,160,220,.35);}
.hc.bl{bottom:18px;left:18px;border-bottom:2px solid rgba(0,160,220,.35);border-left:2px solid rgba(0,160,220,.35);}
.hc.br{bottom:18px;right:18px;border-bottom:2px solid rgba(0,160,220,.35);border-right:2px solid rgba(0,160,220,.35);}
/* Corner ticks */
.hc.tl::after{content:'';position:absolute;top:-2px;left:64px;width:10px;height:2px;background:rgba(0,160,220,.35);}
.hc.tr::after{content:'';position:absolute;top:-2px;right:64px;width:10px;height:2px;background:rgba(0,160,220,.35);}

/* ── Scan ── */
.scan{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,160,220,.12),transparent);animation:sc 7s linear infinite;pointer-events:none;z-index:2;}
@keyframes sc{from{top:0}to{top:100vh}}

/* ── Floating particles ── */
.pt{position:fixed;border-radius:50%;background:rgba(0,180,240,.5);animation:ptf linear infinite;pointer-events:none;z-index:2;}
@keyframes ptf{0%{transform:translate(0,0);opacity:var(--op);}100%{transform:translate(var(--px),var(--py));opacity:0;}}

/* ── Horizontal accent lines ── */
.hline{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,160,220,.06),transparent);pointer-events:none;z-index:1;}

/* ══ PAGE ══ */
.page{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;gap:0;
}

/* ── ZENNI Z emblem ── */
.emblem{
  width:96px;height:96px;
  border-radius:50%;
  border:2px solid rgba(0,160,220,.5);
  background:radial-gradient(circle at 38% 32%,rgba(0,100,180,.25),rgba(0,0,0,.9));
  display:flex;align-items:center;justify-content:center;
  position:relative;
  margin-bottom:16px;
  animation:embIn .8s cubic-bezier(.17,.67,.3,1.3) both,embGlow 3s 1s ease-in-out infinite;
}
@keyframes embIn{from{opacity:0;transform:scale(.3) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes embGlow{
  0%,100%{box-shadow:0 0 16px rgba(0,160,220,.3)}
  50%{box-shadow:0 0 40px rgba(0,180,240,.8),0 0 80px rgba(0,140,200,.2)}
}
.emb-ring1{position:absolute;inset:-9px;border-radius:50%;border:1.5px solid transparent;border-top-color:rgba(0,180,240,.7);animation:ro 3s linear infinite;}
.emb-ring2{position:absolute;inset:-17px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(0,140,200,.35);animation:ro2 5s linear infinite;}
@keyframes ro{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ro2{from{transform:rotate(0)}to{transform:rotate(-360deg)}}

/* Zenni Z inside */
.emb-z{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;color:#fff;
  text-shadow:0 0 20px rgba(0,180,240,.7);
  line-height:1;position:relative;z-index:2;
}

/* ── Welcome ── */
.welcome{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;letter-spacing:8px;
  color:rgba(255,255,255,.4);
  text-transform:uppercase;
  margin-bottom:4px;
  animation:fu .4s .4s ease both;
}

/* ── Name ── */
.fullname{
  font-family:'Bebas Neue',sans-serif;
  font-size:64px;color:#ffffff;
  letter-spacing:4px;line-height:1;
  margin-bottom:6px;
  animation:nameIn .6s .5s ease both;
  text-shadow:0 0 24px rgba(0,160,220,.35),0 2px 0 rgba(0,0,0,.8);
  text-align:center;
}
@keyframes nameIn{from{opacity:0;letter-spacing:16px}to{opacity:1;letter-spacing:4px}}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
  animation:fu .4s .65s ease both;
}
.div-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,160,220,.5));}
.div-line.r{background:linear-gradient(90deg,rgba(0,160,220,.5),transparent);}
.div-dot{width:4px;height:4px;border-radius:50%;background:#0090d8;box-shadow:0 0 6px rgba(0,160,220,.8);}

/* ── Role card ── */
.role-card{
  border:1px solid rgba(0,160,220,.28);
  background:rgba(0,60,100,.15);
  padding:12px 32px;
  display:flex;flex-direction:column;
  align-items:center;gap:4px;
  margin-bottom:10px;
  animation:fu .5s .75s ease both;
  position:relative;overflow:hidden;
  min-width:280px;
}
.role-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,240,.6),transparent);}
.role-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,140,200,.3),transparent);}
/* Shine sweep */
.role-card-shine{
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,180,240,.05),transparent);
  animation:shine 3s ease-in-out infinite;
}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}

.role-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;letter-spacing:5px;
  color:#00b4e0;text-transform:uppercase;font-weight:700;
  text-shadow:0 0 10px rgba(0,160,220,.5);
  line-height:1;
}
.role-dept{
  font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:3px;
  color:rgba(255,255,255,.5);text-transform:uppercase;
}
.role-co{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:3px;
  color:rgba(0,160,220,.45);text-transform:uppercase;
}

/* ── Live status indicators ── */
.status-row{
  display:flex;align-items:center;gap:20px;
  margin-bottom:14px;
  animation:fu .4s .88s ease both;
}
.status-item{display:flex;align-items:center;gap:5px;}
.status-dot{width:6px;height:6px;border-radius:50%;animation:dotPulse 2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.status-dot.online{background:#00d890;box-shadow:0 0 6px rgba(0,200,140,.7);}
.status-dot.active{background:#00b4e0;box-shadow:0 0 6px rgba(0,160,220,.7);animation-delay:.4s;}
.status-dot.ready{background:#ffc800;box-shadow:0 0 6px rgba(200,160,0,.7);animation-delay:.8s;}
.status-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;}

/* ── Progress ── */
.pbar-wrap{width:300px;animation:fu .4s .98s ease both;}
.pbar-top{
  display:flex;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:2px;color:rgba(255,255,255,.55);
  text-transform:uppercase;margin-bottom:6px;
}
.pbar-track{
  width:100%;height:4px;
  background:rgba(0,140,200,.1);
  border:1px solid rgba(0,160,220,.25);
  overflow:hidden;position:relative;
}
.pbar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#002a50,#0070cc,#00b4e0,#40d8ff);
  background-size:300% 100%;
  animation:pf 6s 1s ease forwards,ps 4s 1s linear infinite;
  position:relative;
}
.pbar-fill::after{content:'';position:absolute;right:0;top:0;width:14px;height:100%;background:rgba(80,220,255,.6);filter:blur(3px);}
@keyframes pf{0%{width:0%}40%{width:50%}70%{width:76%}90%{width:91%}100%{width:100%}}
@keyframes ps{0%{background-position:0%}100%{background-position:300%}}
.pbar-ticks{display:flex;justify-content:space-between;margin-top:3px;}
.ptick{width:1px;height:4px;background:rgba(0,160,220,.2);}
.sys-txt{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:2px;color:rgba(0,180,240,.45);
  text-transform:uppercase;margin-top:6px;text-align:center;
  animation:fu .4s 2.8s ease both;
}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* corners text */
.ctxt{position:fixed;font-family:'DM Mono',monospace;font-size:8px;color:rgba(0,160,220,.2);letter-spacing:2px;z-index:1;}
.ctxt.tl{top:20px;left:88px;}
.ctxt.br{bottom:20px;right:88px;}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="scan"></div>

<!-- HUD corners -->
<div class="hc tl"></div>
<div class="hc tr"></div>
<div class="hc bl"></div>
<div class="hc br"></div>

<!-- Corner labels -->
<div class="ctxt tl">ZENNI LMS · PRODUCTION</div>
<div class="ctxt br">SESSION ACTIVE</div>

<!-- Horizontal accent lines -->
<div class="hline" style="top:22%;"></div>
<div class="hline" style="top:78%;"></div>

<!-- Particles -->
<div class="pt" style="width:2px;height:2px;left:18%;top:45%;--px:-40px;--py:-100px;--op:.7;animation-duration:4s;animation-delay:0s;"></div>
<div class="pt" style="width:3px;height:3px;left:30%;top:55%;--px:-30px;--py:-120px;--op:.8;animation-duration:3.5s;animation-delay:.6s;"></div>
<div class="pt" style="width:2px;height:2px;left:70%;top:48%;--px:40px;--py:-110px;--op:.7;animation-duration:4.2s;animation-delay:1.2s;"></div>
<div class="pt" style="width:3px;height:3px;left:82%;top:52%;--px:35px;--py:-95px;--op:.8;animation-duration:3.8s;animation-delay:.4s;"></div>
<div class="pt" style="width:2px;height:2px;left:50%;top:60%;--px:-20px;--py:-130px;--op:.6;animation-duration:4.5s;animation-delay:1.8s;"></div>
<div class="pt" style="width:2px;height:2px;left:42%;top:42%;--px:25px;--py:-105px;--op:.7;animation-duration:3.6s;animation-delay:2.4s;"></div>

<div class="page">

  <!-- Zenni emblem -->
  <div class="emblem">
    <div class="emb-ring1"></div>
    <div class="emb-ring2"></div>
    <div class="emb-z">Z</div>
  </div>

  <div class="welcome">Welcome back</div>
  <div class="fullname" id="displayName">Team Lead</div>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-dot"></div>
    <div class="div-line r"></div>
  </div>

  <div class="role-card">
    <div class="role-card-shine"></div>
    <div class="role-title">Production Team Lead</div>
    <div class="role-dept">Manufacturing Operations</div>
    <div class="role-co">Zenni USA · Ohio</div>
  </div>

  <!-- Live status row -->
  <div class="status-row">
    <div class="status-item">
      <div class="status-dot online"></div>
      <div class="status-lbl">Online</div>
    </div>
    <div class="status-item">
      <div class="status-dot active"></div>
      <div class="status-lbl">Systems Active</div>
    </div>
    <div class="status-item">
      <div class="status-dot ready"></div>
      <div class="status-lbl">Ready</div>
    </div>
  </div>

  <div class="pbar-wrap">
    <div class="pbar-top"><span>Loading Dashboard</span><span id="pct">0%</span></div>
    <div class="pbar-track"><div class="pbar-fill"></div></div>
    <div class="pbar-ticks">
      <div class="ptick"></div><div class="ptick"></div><div class="ptick"></div>
      <div class="ptick"></div><div class="ptick"></div><div class="ptick"></div>
      <div class="ptick"></div><div class="ptick"></div><div class="ptick"></div><div class="ptick"></div>
    </div>
    <div class="sys-txt" id="sysTxt">Preparing your workspace...</div>
  </div>

</div>

<script>
  const n=sessionStorage.getItem("lms_fullname")||"Team Lead";
  const r=sessionStorage.getItem("lms_role")||"Production";
  const s=sessionStorage.getItem("lms_subrole")||"Team Lead";
  document.getElementById("displayName").textContent=n;

  const msgs=["Preparing your workspace...","Loading production data...","Syncing team metrics...","Almost ready...","Dashboard loading..."];
  let p=0;const pEl=document.getElementById("pct");const sysEl=document.getElementById("sysTxt");
  const iv=setInterval(()=>{
    p=Math.min(99,p+Math.floor(Math.random()*2)+1);pEl.textContent=p+"%";
    if(p<20)sysEl.textContent=msgs[0];else if(p<40)sysEl.textContent=msgs[1];
    else if(p<60)sysEl.textContent=msgs[2];else if(p<80)sysEl.textContent=msgs[3];
    else sysEl.textContent=msgs[4];
    if(p>=99)clearInterval(iv);
  },100);
  const MIN_TIME=6000;const startTime=Date.now();
  const preload=document.createElement("link");preload.rel="prefetch";preload.href="index.html";document.head.appendChild(preload);
  function go(){const e=Date.now()-startTime;const r=Math.max(0,MIN_TIME-e);setTimeout(()=>{p=100;pEl.textContent="100%";clearInterval(iv);setTimeout(()=>{window.location.replace("index.html");},400);},r);}
  fetch("index.html",{method:"GET",cache:"force-cache"}).then(()=>go()).catch(()=>go());
  setTimeout(()=>{window.location.replace("index.html");},10000);
</script>
</body>
</html>
